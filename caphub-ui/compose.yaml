services:
  caphub-ui:
    build:
      context: .
      target: dev
    container_name: caphub-ui
    ports:
      - "${CAPHUB_UI_PORT:-5188}:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://10.10.9.184:8090/api}
    volumes:
      - ./:/app
      - caphub-ui-node-modules:/app/node_modules
    command: >
      sh -lc "if [ ! -x /app/node_modules/.bin/vite ]; then npm install; fi && npm run dev"

volumes:
  caphub-ui-node-modules:
